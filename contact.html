<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="./contact.css">
    </head>
    <body>
        <div class="hero">
        <nav>
            <div class="logo"><h1>Travel Bloom</h1></div>
            <ul class="nav-links">
                <li><h4><a href="./index.html" id="home">Home</a></h4></li>
                <li><h4><a href="./about.html" id="about">About Us</a></h4></li>
                <li><h4><a href="./contact.html" id="contact">Contact Us</a></h4></li>
            </ul>
        </nav>
        <div class="content">
            <img id="background_image" src="https://media.easemytrip.com/media/Blog/India/636992327688898040/636992327688898040tDeelE.jpg" alt="Destination"> 
            <img id="twitter" src="https://e7.pngegg.com/pngimages/708/311/png-clipart-twitter-twitter.png" alt="Twitter">
            <img id="facebook" src="https://png.pngtree.com/element_our/png_detail/20181011/facebook-social-media-icon-design-template-vector-png_127003.png" alt="Facebook">
            <img id="instagram" src="https://img.magnific.com/premium-vector/instagram-vector-logo-icon-social-media-logotype_901408-392.jpg?semt=ais_hybrid&w=740&q=80" alt="Instagram">
            <img id="youtube" src="https://t4.ftcdn.net/jpg/03/04/06/01/360_F_304060171_OUUSKIITlOLRgnDI1EFO8eSZqOHab6Iq.jpg" alt="YouTube">
            <div class="contact-info">
                <h1>Contact Us</h1>
                <p>Get in touch with us anytime!</p>
            </div>
            <div class="contact-form">
                <form>
                    <label for="name">Name:</label>
                    <input type="text" id="name" placeholder="Enter your Name" required>
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="Enter your Email" required>
                    <label for="message">Message:</label>
                    <textarea id="message" rows="5" placeholder="Enter your Message" required></textarea>
                    <button type="submit">Submit</button>
                </form>
            </div>
        </div>
    </body>
</html>
